name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      repo:
        description: Repository to checkout (owner/repo)
        required: false
        default: ''
      type:
        description: Test type to run
        required: false
        default: UI
        type: choice
        options:
          - UI
          - API
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      CI: true
      HEADLESS: true
      BASE_URL: ${{ vars.BASE_URL || 'https://automationexercise.com' }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo || github.repository }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Prepare environment file
        shell: bash
        run: |
          if [ -f .env ]; then
            echo ".env already present; keeping it and using it for the run"
          else
            cat > .env <<EOF
          BASE_URL=${{ vars.BASE_URL || secrets.BASE_URL || 'https://automationexercise.com' }}
          HEADLESS=true
          EOF
          fi

      - name: Run UI tests
        if: ${{ inputs.type == 'UI' || github.event_name != 'workflow_dispatch' }}
        run: npm run UIcases

      - name: Run API tests
        if: ${{ inputs.type == 'API' }}
        run: npm run APIcases

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ inputs.type || 'all' }}
          path: playwright-report/
          retention-days: 30
