name: AutomationExercise_SDET

on:
  workflow_dispatch:
    inputs:

      Test Type:
        description: Test type to run
        required: false
        default: UI
        type: choice
        options:
          - UI
          - API
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  setup:
    name: Setup environment
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      CI: true
      HEADLESS: true
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Prepare environment file
        shell: bash
        run: |
          if [ -f .env ]; then
            echo ".env already present; keeping it and using it for the run"
          else
            echo "BASE_URL=${{ secrets.BASE_URL || 'https://automationexercise.com' }}" > .env
            echo "HEADLESS=true" >> .env
          fi

      - name: Upload .env artifact
        uses: actions/upload-artifact@v4
        with:
          name: env-file
          path: .env

  run-tests:
    name: Run tests
    needs: setup
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      CI: true
      HEADLESS: true
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}

      - name: Download .env artifact
        uses: actions/download-artifact@v4
        with:
          name: env-file
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        if: ${{ inputs['Test Type'] == 'UI' || github.event_name != 'workflow_dispatch' }}
        run: npm run UIcases

      - name: Run API tests
        if: ${{ inputs['Test Type'] == 'API' || github.event_name != 'workflow_dispatch' }}
        run: npm run APIcases

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ inputs['Test Type'] || 'all' }}
          path: playwright-report/
          retention-days: 30
